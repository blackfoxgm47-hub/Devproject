<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการประเมิน</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>เมนู</h2>
        </div>
        <ul class="sidebar-menu">
            <li class="menu-item">
                <a href="index.html" class="menu-link">แบบประเมินลูกไก่ก่อนออก</a>
            </li>
            <li class="menu-item active">
                <a href="history.html" class="menu-link">ประวัติการประเมิน</a>
            </li>
            <li class="menu-item">
                <a href="dashboard.html" class="menu-link">ภาพรวมการประเมิน</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <h1 class="title">ประวัติการประเมิน</h1>

            <div class="section">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button onclick="loadHistory()" class="btn btn-load">โหลดประวัติ</button>
                    <button onclick="clearHistory()" class="btn btn-clear">ล้างประวัติ</button>
                </div>
            </div>

            <div class="section table-section">
                <table class="data-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>ลำดับที่</th>
                            <th>วันที่</th>
                            <th>เวลา Start prod</th>
                            <th>จำนวนตู้</th>
                            <th>%ตู้ที่ผ่าน</th>
                            <th>เวลาออกลูกไก่</th>
                            <th>การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- History rows will be generated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="historyDetails" class="section" style="display: none;">
                <h3 class="section-title">รายละเอียดข้อมูล</h3>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="history.js"></script>
</body>
</html>
